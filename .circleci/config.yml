version: 2.1

# Optimize caching and package installation using the official Node orb
orbs:
  node: circleci/node@6.0.0

jobs:
  run-tests:
    docker:
      # Use the pre-built Playwright image matching your project's Playwright version
      - image: ://microsoft.com
    
    steps:
      # Pull down your source code
      - checkout

      # Install node modules using caching for faster subsequent builds
      - node/install-packages:
          pkg-manager: npm

      # Run the Playwright test suite
      - run:
          name: Run Playwright Tests
          command: npx playwright test

      # Upload the HTML report so you can view it directly in the CircleCI UI
      - store_artifacts:
          path: playwright-report
          destination: playwright-report

      # Upload JUnit XML or standard test metrics to populate the CircleCI "Tests" tab
      - store_test_results:
          path: test-results

workflows:
  e2e-testing:
    jobs:
      - run-tests
