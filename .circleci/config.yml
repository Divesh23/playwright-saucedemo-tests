version: 2.1

# Optimize caching and package installation using the official Node orb
orbs:
  node: circleci/node@6.0.0

jobs:
  run-tests:
    docker:
      - image: mcr.microsoft.com/playwright:v1.61.1-noble
    
    steps:
      - checkout

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Run Playwright Tests
          command: npx playwright test

      # Upload the HTML report so you can view it directly in the CircleCI UI
      - store_artifacts:
          path: playwright-report
          destination: playwright-report

      # Upload JUnit XML or standard test metrics to populate the CircleCI "Tests" tab
      - store_test_results:
          path: test-results

workflows:
  e2e-testing:
    jobs:
      - run-tests
